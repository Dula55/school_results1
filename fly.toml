# fly.toml app configuration file for school-results1
# See https://fly.io/docs/reference/configuration/ for information

app = "school-results1"
primary_region = "iad"  # Change to your preferred region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Optional: Add a volume for persistent storage
# Create volume first with: fly volumes create data --size 1
[[mounts]]
  source = "data"
  destination = "/data"